spring.application.name=biterate

# ==========================================
# BANCO DE DADOS — MySQL (docker-compose)
# ==========================================
spring.datasource.url=jdbc:mysql://localhost:3306/biterate_db?useSSL=false&serverTimezone=America/Sao_Paulo&allowPublicKeyRetrieval=true
spring.datasource.username=biterate_user
spring.datasource.password=biterate_senha
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
 
# ==========================================
# JPA / HIBERNATE
# ==========================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
 
# ==========================================
# JWT
# ==========================================
jwt.secret=${JWT_SECRET:bml0ZXJhdGVfc2VjcmV0X2tleV9zdXBlcl9zZWd1cmFfMjAyNQ==}
jwt.expiration=${JWT_EXPIRATION:86400000}
 
# ==========================================
# SERVIDOR
# ==========================================
server.port=8080